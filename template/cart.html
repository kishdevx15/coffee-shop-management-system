{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #F7F3EF;
      color: #1A1209;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }
    .container { max-width: 580px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #EDE6DE; border-radius: 8px;
      padding: 6px 12px; font-size: 0.875rem; font-weight: 500;
      color: #3C2A1A; cursor: pointer; text-decoration: none; transition: background 0.15s;
    }
    .back-btn:hover { background: #F0E9DF; }
    h1 { font-size: 1.375rem; font-weight: 600; color: #1A1209; }
    .empty { text-align: center; padding: 5rem 1rem; color: #A08060; }
    .empty svg { margin-bottom: 1rem; opacity: 0.4; }
    .empty p { font-size: 0.9375rem; }
    .item-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
    .item-card {
      background: #fff; border: 1px solid #EDE6DE; border-radius: 12px;
      padding: 0.875rem 1rem; display: flex; align-items: center; gap: 0.875rem;
    }
    .item-name {
      flex: 1; font-size: 0.9375rem; font-weight: 500; color: #1A1209;
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-price { font-size: 0.85rem; color: #7A6652; white-space: nowrap; min-width: 80px; text-align: right; }
    .item-price strong { display: block; font-size: 0.9375rem; font-weight: 600; color: #1A1209; }
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid #D6C9BA;
      background: #F7F3EF; color: #3C2A1A; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s; flex-shrink: 0;
    }
    .qty-btn:hover { background: #EDE6DE; }
    .qty-val { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; color: #1A1209; }
    .divider { height: 1px; background: #EDE6DE; margin: 0.25rem 0 1rem; }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem; padding: 0 0.25rem;
    }
    .total-label { font-size: 0.9375rem; color: #7A6652; }
    .total-amount { font-size: 1.125rem; font-weight: 700; color: #1A1209; }
    .submit-btn {
      width: 100%; padding: 13px; background: #3C2A1A; color: #F5EDE3;
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit; display: flex; align-items: center;
      justify-content: center; gap: 8px; transition: background 0.15s;
    }
    .submit-btn:hover:not(:disabled) { background: #2C1E10; }
    .submit-btn:disabled { background: #C0A898; cursor: not-allowed; }
    .toast {
      display: none; margin-top: 12px; background: #D1FAE5; color: #065F46;
      border-radius: 10px; padding: 11px 16px; text-align: center;
      font-size: 0.875rem; font-weight: 500;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a href="javascript:history.back()" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
    <h1>Your cart</h1>
  </div>

  {% if cart_items %}
    <div class="item-list" id="item-list">
      {% for item in cart_items %}
      <div class="item-card" id="item-{{ item.id }}">
        <span class="item-name">{{ item.product.name }}</span>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty({{ item.id }}, {{ item.product.price }}, -1)" aria-label="Decrease">−</button>
          <span class="qty-val" id="qty-{{ item.id }}">{{ item.quantity }}</span>
          <button class="qty-btn" onclick="changeQty({{ item.id }}, {{ item.product.price }}, 1)" aria-label="Increase">+</button>
        </div>
        <div class="item-price">
          <span>₹{{ item.product.price }} × <span id="qty-label-{{ item.id }}">{{ item.quantity }}</span></span>
          <strong id="line-{{ item.id }}">₹0.00</strong>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="divider" id="divider"></div>

    <div class="total-row" id="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount">₹<span id="total-val">0.00</span></span>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Submit order
    </button>
    <div class="toast" id="toast"></div>

  {% else %}
    <div class="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/>
      </svg>
      <p>Your cart is empty.</p>
    </div>
  {% endif %}

</div>

<script>
  const CSRF = "{{ csrf_token }}";

  const itemData = {
    {% for item in cart_items %}
    "{{ item.id }}": { price: parseFloat("{{ item.product.price }}"), qty: {{ item.quantity }} },
    {% endfor %}
  };

  function recalcTotal() {
    let total = 0;
    for (const id in itemData) {
      total += itemData[id].price * itemData[id].qty;
    }
    const el = document.getElementById("total-val");
    if (el) el.textContent = total.toFixed(2);
  }

  // Set all line totals on page load
  for (const id in itemData) {
    const el = document.getElementById("line-" + id);
    if (el) el.textContent = "₹" + (itemData[id].price * itemData[id].qty).toFixed(2);
  }
  recalcTotal();

  async function changeQty(itemId, price, delta) {
    const current = itemData[itemId] ? itemData[itemId].qty : 1;
    const newQty  = current + delta;

    if (newQty <= 0) {
      const res = await fetch("/cart/remove/" + itemId + "/", {
        method: "POST",
        headers: { "X-CSRFToken": CSRF },
      });
      if (res.ok) {
        const card = document.getElementById("item-" + itemId);
        if (card) card.remove();
        delete itemData[itemId];
        recalcTotal();
        if (Object.keys(itemData).length === 0) location.reload();
      }
      return;
    }

    const res = await fetch("/cart/update/" + itemId + "/", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": CSRF },
      body: JSON.stringify({ quantity: newQty }),
    });

    if (res.ok) {
      itemData[itemId].qty = newQty;
      document.getElementById("qty-" + itemId).textContent       = newQty;
      document.getElementById("qty-label-" + itemId).textContent = newQty;
      document.getElementById("line-" + itemId).textContent      = "₹" + (price * newQty).toFixed(2);
      recalcTotal();
    }
  }

  async function submitOrder() {
    const btn = document.getElementById("submit-btn");
    btn.disabled    = true;
    btn.textContent = "Placing order…";

    const res = await fetch("/cart/place-order/", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": CSRF },
      body: JSON.stringify({}),
    });

    if (res.ok) {
      document.getElementById("item-list").innerHTML  = "";
      document.getElementById("divider").style.display    = "none";
      document.getElementById("total-row").style.display  = "none";
      btn.style.display = "none";
      const toast = document.getElementById("toast");
      toast.style.display = "block";
      toast.innerHTML = "&#10003; Order placed! Your barista is on it.";
    } else {
      btn.disabled    = false;
      btn.textContent = "Submit order";
      alert("Something went wrong. Please try again.");
    }
  }
</script>
</body>
</html>
