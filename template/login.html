{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login | KishCraft Coffee</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #6b1f23;
    --maroon-dark: #4d1518;
    --cream: #f8f1e7;
    --olive-brown: #6e5849;
    --error: #b3261e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(160deg, var(--maroon) 0%, var(--maroon-dark) 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: var(--cream);
    width: 100%;
    max-width: 380px;
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  .login-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-header .icon-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--maroon);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }

  .login-header .icon-circle i {
    font-size: 28px;
    color: var(--cream);
  }

  .login-header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--maroon);
    font-size: 24px;
    margin-bottom: 4px;
  }

  .login-header p {
    color: var(--olive-brown);
    font-size: 13px;
  }

  .error-box {
    background: #fbe9e7;
    border: 1px solid var(--error);
    color: var(--error);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--maroon-dark);
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--olive-brown);
    font-size: 18px;
  }

  .input-wrap input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1px solid #d9cdbd;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Lato', sans-serif;
    background: #fff;
    color: var(--maroon-dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: var(--maroon);
  }

  .toggle-pass {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--olive-brown);
    font-size: 18px;
    background: none;
    border: none;
  }

  .login-btn {
    width: 100%;
    background: var(--maroon);
    color: var(--cream);
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .login-btn:hover {
    background: var(--maroon-dark);
  }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--olive-brown);
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="icon-circle"><i class="ti ti-coffee"></i></div>
    <h1>KishCraft Coffee</h1>
    <p>Kitchen Dashboard Staff Login</p>
  </div>

  {% if form.errors or error %}
  <div class="error-box">
    <i class="ti ti-alert-circle"></i>
    <span>Invalid username or password. Please try again.</span>
  </div>
  {% endif %}

  <form method="POST" action="{% url 'staff_login' %}">
    {% csrf_token %}

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <i class="ti ti-user"></i>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <button type="button" class="toggle-pass" onclick="togglePassword()">
          <i class="ti ti-eye" id="toggleIcon"></i>
        </button>
      </div>
    </div>

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit" class="login-btn">
      <i class="ti ti-login"></i> Login
    </button>
  </form>

  <div class="login-footer">
    &copy; {% now "Y" %} KishCraft Coffee &mdash; Staff Access Only
  </div>
</div>

<script>
function togglePassword() {
  const pass = document.getElementById('password');
  const icon = document.getElementById('toggleIcon');
  if (pass.type === 'password') {
    pass.type = 'text';
    icon.classList.remove('ti-eye');
    icon.classList.add('ti-eye-off');
  } else {
    pass.type = 'password';
    icon.classList.remove('ti-eye-off');
    icon.classList.add('ti-eye');
  }
}
</script>

</body>
</html>
